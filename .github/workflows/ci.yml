name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: mypy strict
        run: uv run mypy packages/server/src packages/policy_sdk/src
      - name: pytest
        run: uv run pytest -v
      - name: install opa
        uses: open-policy-agent/setup-opa@v2
        with: { version: latest }
      - name: opa test
        run: opa test policies/opa -v
      - name: install kyverno CLI
        run: |
          curl -sSLO https://github.com/kyverno/kyverno/releases/download/v1.13.0/kyverno-cli_v1.13.0_linux_x86_64.tar.gz
          tar xzf kyverno-cli_v1.13.0_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/
      - name: kyverno test
        run: kyverno test tests/policy/kyverno/
