[project]
name = "mcp-k8s-secure-ops"
version = "1.0.3"
description = "Auditable AI-assisted Kubernetes incident remediation via MCP."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "vellankikoti", email = "vellankikoti@gmail.com" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Topic :: System :: Systems Administration",
]
dependencies = [
  "pydantic>=2.7",
  "httpx>=0.27",
  "typer>=0.12",
  "fastmcp>=3.0",
  "litellm>=1.40",
  "instructor>=1.3",
  "opentelemetry-api>=1.25",
  "rich>=13.7",
  "aiosqlite>=0.20",
  "kubernetes-asyncio>=30.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "pytest-httpx>=0.30",
  "ruff>=0.4",
  "mypy>=1.10",
  "PyYAML>=6.0",
  "types-PyYAML",
  "opentelemetry-sdk>=1.25",
]

[project.scripts]
mcp-k8s-secure-ops = "secureops_server.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/secureops_server"]
