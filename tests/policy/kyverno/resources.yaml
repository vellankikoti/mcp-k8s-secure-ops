---
apiVersion: v1
kind: Namespace
metadata:
  name: prod-ns
  labels:
    tier: prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-scaled-zero
  namespace: prod-ns
spec:
  replicas: 0
  selector:
    matchLabels: { app: checkout }
  template:
    metadata:
      labels: { app: checkout }
    spec:
      containers:
        - name: app
          image: nginx:1.27
