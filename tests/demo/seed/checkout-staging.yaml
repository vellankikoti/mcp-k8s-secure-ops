apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: demo-staging
  labels:
    app: checkout
    env: staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
        env: staging
    spec:
      containers:
        - name: checkout
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
