# ── BROKER SA — can create TokenRequests in demo-staging ─────────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secureops-broker
  namespace: demo-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secureops-broker-tokenrequest-role
  namespace: demo-staging
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secureops-broker-tokenrequest-binding
  namespace: demo-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secureops-broker-tokenrequest-role
subjects:
  - kind: ServiceAccount
    name: secureops-broker
    namespace: demo-staging

