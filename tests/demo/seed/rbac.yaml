# Demo RBAC seed — mirrors what helm/secureops/ would install in-cluster.
# Per-action ServiceAccount + Role + RoleBinding for each (verb, namespace) pair.
# Broker SA gets create on serviceaccounts/token in both namespaces.
#
# Naming convention (from tokens/rbac_templates.py):
#   secureops-action-{verb}-{kind}-{namespace}  (truncated to 63 chars)

# ── ACTION: restart deployment in demo-staging ────────────────────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secureops-action-restart-deployment-demo-staging
  namespace: demo-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secureops-action-restart-deployment-demo-staging-role
  namespace: demo-staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secureops-action-restart-deployment-demo-staging-binding
  namespace: demo-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secureops-action-restart-deployment-demo-staging-role
subjects:
  - kind: ServiceAccount
    name: secureops-action-restart-deployment-demo-staging
    namespace: demo-staging

