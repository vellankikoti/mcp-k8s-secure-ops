    namespace: demo-prod

# ── Cluster-wide reads for the MCP server (list namespaces, get events, etc.) ─
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secureops-demo-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "events", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secureops-demo-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secureops-demo-reader
subjects:
  # The MCP server runs as the user's kubeconfig identity in local-dev mode.
  # Bind to the default service account as a backstop; kubeconfig user is
  # usually already cluster-admin in a kind cluster.
  - kind: ServiceAccount
    name: secureops-broker
    namespace: demo-staging
  - kind: ServiceAccount
    name: secureops-broker
    namespace: demo-prod
